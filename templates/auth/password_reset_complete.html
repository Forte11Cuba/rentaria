{% extends "auth/base_auth.html" %}

{% block title %}Contraseña restablecida — Rentaria{% endblock %}

{% block card %}
<div class="text-center">
    <div class="w-12 h-12 rounded-full bg-green-900/20 border border-green-700/30 flex items-center justify-center mx-auto mb-5">
        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
    </div>

    <h2 class="text-sm font-semibold text-[#c9cdd4] mb-2">Contraseña restablecida</h2>
    <p class="text-xs text-[#c9cdd4] opacity-50">Tu contraseña ha sido actualizada correctamente.</p>
</div>
{% endblock %}

{% block below_card %}
<p class="mt-4 text-center">
    <a href="{% url 'login' %}" class="text-xs text-[#f7931a] hover:underline">
        Iniciar sesión
    </a>
</p>
{% endblock %}
