<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activa tu cuenta — {{ tienda.nombre }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#111] min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        {% if tienda.logo %}
        <img src="{{ tienda.logo.url }}" alt="{{ tienda.nombre }}" class="h-10 object-contain mb-8 mx-auto">
        {% else %}
        <h1 class="text-white text-xl font-bold mb-8 text-center">{{ tienda.nombre }}</h1>
        {% endif %}

        <form method="post" class="space-y-4 bg-[#1a1a1a] border border-white/10 p-6">
            {% csrf_token %}
            <div class="mb-4">
                <h2 class="text-white text-sm font-semibold uppercase tracking-wider">Activa tu cuenta</h2>
                <p class="text-white/40 text-xs mt-1">Cuenta para {{ customer.email }}</p>
            </div>

            {% if error %}
            <p class="text-red-400 text-xs bg-red-400/10 border border-red-400/20 px-3 py-2">{{ error }}</p>
            {% endif %}

            <div>
                <label class="block text-xs text-white/50 mb-1.5">Tu nombre</label>
                <input type="text" name="nombre" required autofocus
                       class="w-full bg-[#111] border border-white/10 text-white text-sm px-3 py-2 focus:outline-none focus:border-white/40"
                       placeholder="Nombre completo">
            </div>

            <div>
                <label class="block text-xs text-white/50 mb-1.5">Contraseña</label>
                <input type="password" name="password" required minlength="8"
                       class="w-full bg-[#111] border border-white/10 text-white text-sm px-3 py-2 focus:outline-none focus:border-white/40"
                       placeholder="Mínimo 8 caracteres">
            </div>

            <div>
                <label class="block text-xs text-white/50 mb-1.5">Confirmar contraseña</label>
                <input type="password" name="password_confirm" required
                       class="w-full bg-[#111] border border-white/10 text-white text-sm px-3 py-2 focus:outline-none focus:border-white/40">
            </div>

            <button type="submit"
                    class="w-full py-2.5 bg-orange-500 text-black text-sm font-semibold hover:bg-orange-400 transition-colors">
                Activar cuenta
            </button>
        </form>
    </div>
</body>
</html>
